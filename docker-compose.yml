services:

  redis:
    image: redis:7-alpine
    container_name: manga-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  iopaint:
    build:
      context: .
      dockerfile: Dockerfile.iopaint
    container_name: manga-iopaint
    restart: unless-stopped
    ports:
      - "8080:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - iopaint_models:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manga-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - IOPAINT_URL=http://iopaint:8080
    volumes:
      - ./uploads:/app/uploads
      - ./downloads:/app/downloads
      - ./temp:/app/temp
      - ./models:/app/models
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manga-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - IOPAINT_URL=http://iopaint:8080
    volumes:
      - ./uploads:/app/uploads
      - ./downloads:/app/downloads
      - ./temp:/app/temp
      - ./models:/app/models
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A tasks.worker.celery_app worker --loglevel=info --concurrency=2

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manga-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MANGA_API_URL=http://api:8000
    volumes:
      - ./temp:/app/temp
      - ./downloads:/app/downloads
    depends_on:
      api:
        condition: service_healthy
    command: python3 bot/telegram_bot.py

volumes:
  redis_data:
  iopaint_models:
